<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Basic Meta Tags -->
    <title>Za Ile Się Widzimy?</title>
    <meta name="description" content="Odliczanie do naszego spotkania 💕">
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="favicon.png">
    
    <!-- iOS/iMessage specific -->
    <meta property="og:title" content="Za Ile Się Widzimy?">
    <meta property="og:description" content="Odliczanie do naszego spotkania 💕">
    <meta property="og:image" content="https://zailesiewidzi.my/preview.jpg">
    <meta property="og:url" content="https://zailesiewidzi.my/">
    
    <!-- iOS specific -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <meta name="mobile-web-app-capable" content="yes">
    
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #fdf6e3;
            margin: 0;
        }

        /* Memory game styles */
        .game-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            max-width: 600px;
            margin: 20px auto;
            padding: 10px;
        }

        .card {
            aspect-ratio: 1;
            background: #ddd;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.6s;
            transform-style: preserve-3d;
            position: relative;
            -webkit-tap-highlight-color: transparent;
        }

        .card.flipped {
            transform: rotateY(180deg);
        }

        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
        }

        .card-front {
            background: #2196F3;
        }

        .card-back {
            background: white;
            transform: rotateY(180deg);
        }

        .card img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
        }

        /* Countdown section styles */
        #countdownSection {
            text-align: center;
            max-width: 800px;
            margin: 20px auto;
            padding: 20px;
        }

        #countdownText {
            font-size: 24px;
            margin: 20px 0;
            padding: 20px;
            background: rgba(255,255,255,0.9);
            border-radius: 10px;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        #surpriseBox {
            width: 200px;
            height: 200px;
            margin: 20px auto;
            background-color: #ffcc00;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        #surpriseContent {
            margin-top: 20px;
            padding: 20px;
        }

        #surpriseContent img {
            max-width: 100%;
            height: auto;
            border-radius: 10px;
        }

        .previous-games {
            margin-top: 30px;
            padding: 20px;
        }

        .previous-games h3 {
            margin-bottom: 15px;
        }

        .previous-games a {
            display: inline-block;
            margin: 10px;
            padding: 10px 20px;
            background: #ffcc00;
            color: black;
            text-decoration: none;
            border-radius: 5px;
            transition: background 0.3s;
        }

        .previous-games a:hover {
            background: #ffd633;
        }

        .popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: transform 0.3s;
            z-index: 1000;
        }

        .popup.show {
            transform: translate(-50%, -50%) scale(1);
        }

        .popup img {
            width: 150px;
            height: 150px;
            object-fit: cover;
            border-radius: 50%;
            margin-bottom: 10px;
        }

        .popup p {
            margin: 10px 0;
            font-size: 1.2em;
            text-align: center;
        }

        #memoryGameSection {
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
        }

        .skip-button {
            display: block;
            margin: 20px auto;
            padding: 10px 20px;
            background: #ffcc00;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        .skip-button:hover {
            background: #ffd633;
        }

        #gameIntro {
            text-align: center;
            max-width: 600px;
            margin: 20px auto;
            padding: 20px;
        }

        #gameContainer {
            position: relative;
            width: 800px;
            height: 800px;
            margin: 20px auto;
            display: flex;
            flex-direction: column;
        }

        .road-container {
            position: relative;
            width: 100%;
            height: 600px;
            background: #fff;
            border-radius: 10px;
            overflow: hidden;
        }

        .road {
            width: 100%;
            height: 100%;
            background: url('images/road-curve.png') no-repeat center;
            background-size: contain;
            position: relative;
        }

        .car {
            position: absolute;
            width: 120px;
            height: 60px;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            transition: left 0.5s linear, top 0.5s linear, transform 0.5s linear;
            -webkit-tap-highlight-color: transparent;
        }

        .scoreboard {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background: rgba(255,255,255,0.9);
            border-radius: 10px;
            margin-bottom: 20px;
            z-index: 2;
            position: relative;
        }

        .lives {
            display: flex;
            gap: 10px;
        }

        .life {
            width: 30px;
            height: 30px;
            background: url('images/ferrari.png') no-repeat center;
            background-size: contain;
            display: inline-block;
        }

        .game-buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 20px;
            margin-top: 20px;
            width: 100%;
            box-sizing: border-box;
        }

        .game-button {
            padding: 15px 30px;
            font-size: 18px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            background: #ffcc00;
        }

        .game-button:hover {
            background: #ffd633;
        }

        /* Make sure everything stays responsive */
        @media (max-width: 600px) {
            #countdownSection {
                padding: 10px;
            }

            #countdownText {
                font-size: 20px;
                padding: 15px;
            }

            #surpriseBox {
                width: 150px;
                height: 150px;
            }

            .previous-games a {
                margin: 5px;
                padding: 8px 16px;
            }
        }
    </style>
</head>
<body>
    <div id="gameIntro" style="text-align: center; margin: 20px;">
        <h2>Jak myślisz, za ile sekund się zobaczymy?</h2>
        <input type="number" id="secondsGuess" min="0" style="padding: 10px; font-size: 16px; margin: 10px;">
        <button onclick="checkGuess()" class="game-button">Sprawdź!</button>
    </div>

    <div id="guessResult" style="display: none; text-align: center; margin: 20px;">
        <h2 id="resultText"></h2>
    </div>

    <div id="countdownSection" style="display: none;">
        <h2 id="countdownText">Widzimy się już za X dni!</h2>
        <p id="gptComparison" style="font-style: italic; margin: 20px 0; padding: 10px; background: rgba(255,255,255,0.7); border-radius: 5px;">
            <!-- GPT response will be inserted here -->
        </p>
        <div id="surpriseBox" onclick="showSurprise()">
            <p>Dzisiejsza niespodzianka</p>
        </div>
        <div id="surpriseContent" style="display: none;">
            <img src="https://i.giphy.com/media/v1.Y2lkPTc5MGI3NjExaGp4cWxnM2NxYjV0bGIyZWNlanE3dng1czY2cTQ0OHQ4d3c3OGRzZSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/82nrkDUHJCMiA/giphy.gif" alt="Surprise GIF">
            <p>Już naprawdę niedługo! 🥺</p>
            <button onclick="openSpotifySong()" style="background-color: #1DB954; color: white; border: none; padding: 10px 20px; border-radius: 20px; font-size: 16px; cursor: pointer; margin-top: 10px; transition: background-color 0.3s ease;">
                Odbierz piosenkę w prezencie 🎵
            </button>
        </div>
        <div class="previous-games">
            <h3>Zagraj w gry z poprzednich dni:</h3>
            <a href="questionnaire.html">Quiz o Czarku</a>
            <a href="whackatesla.html">Whack-a-Tesla</a>
            <a href="wheel.html">Koło Fortuny</a>
            <a href="memory-game.html">Memory Game</a>
        </div>
    </div>

    <audio id="backgroundMusic" loop>
        <source src="like_i_love_you.mp3" type="audio/mpeg">
    </audio>

    <script>
        function getSecondsUntilMeeting() {
            const now = new Date();
            const targetDate = new Date('2024-11-21T17:28:00+01:00');
            return Math.floor((targetDate - now) / 1000);
        }

        async function getGPTComparison(timeString) {
            try {
                const response = await fetch('/api/gpt', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ timeString })
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const data = await response.json();
                console.log('GPT Response:', data); // For debugging
                return data.response;
            } catch (error) {
                console.error('Error:', error);
                return 'To tyle czasu, ile potrzeba na przeczytanie wszystkich książek Harry\'ego Pottera!'; // Fallback response
            }
        }

        async function checkGuess() {
            const guess = parseInt(document.getElementById('secondsGuess').value);
            if (isNaN(guess)) return;

            const actualSeconds = getSecondsUntilMeeting();
            const difference = Math.abs(guess - actualSeconds);

            document.getElementById('gameIntro').style.display = 'none';
            document.getElementById('guessResult').style.display = 'block';
            document.getElementById('resultText').textContent = 
                `Prawie! Pomyliłaś się o ${difference} sekund. Ale i tak czeka cię nagroda! ❤️`;

            // Get initial countdown text
            const now = new Date();
            const targetDate = new Date('2024-11-21T17:28:00+01:00');
            const diff = targetDate - now;
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((diff % (1000 * 60)) / 1000);
            
            const timeString = `${days} dni, ${hours} godzin, ${minutes} minut i ${seconds} sekund`;
            
            // Get GPT comparison
            const gptResponse = await getGPTComparison(timeString);
            
            // Store GPT response in localStorage to avoid making multiple requests
            if (gptResponse) {
                localStorage.setItem('gptComparison', gptResponse);
            }

            // Show countdown after 2 seconds
            setTimeout(() => {
                document.getElementById('guessResult').style.display = 'none';
                document.getElementById('countdownSection').style.display = 'block';
                updateCountdown();
            }, 2000);
        }

        // Add these functions at the end of your script section
        function updateCountdown() {
            const now = new Date();
            const targetDate = new Date('2024-11-21T17:28:00+01:00');
            const diff = targetDate - now;
            
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((diff % (1000 * 60)) / 1000);
            
            document.getElementById('countdownText').textContent = 
                `Widzimy się już za ${days} dni, ${hours} godzin, ${minutes} minut i ${seconds} sekund!`;
            
            // Display stored GPT comparison if available
            const gptComparison = localStorage.getItem('gptComparison');
            if (gptComparison) {
                document.getElementById('gptComparison').textContent = gptComparison;
            }
            
            setTimeout(updateCountdown, 1000);
        }

        function showSurprise() {
            const music = document.getElementById('backgroundMusic');
            const surpriseBox = document.getElementById('surpriseBox');
            music.play();
            surpriseBox.style.display = 'none'; // Hide the surprise box
            document.getElementById('surpriseContent').style.display = 'block';
        }

        function openSpotifySong() {
            window.location.href = "https://open.spotify.com/track/7KA4W4McWYRpgf0fWsJZWB?si=GnmsiU-kRRaqtBtAQ-Kcvw";
        }

        function checkPassword() {
            const password = prompt("Podaj hasło:");
            if (password === "niunia") {
                document.getElementById('memoryGameSection').style.display = 'none';
                document.getElementById('countdownSection').style.display = 'block';
                updateCountdown();
            } else {
                window.location.href = "https://www.youtube.com/watch?v=dQw4w9WgXcQ";
            }
        }

        let gameSpeed = 4000;
        let lives = 5;
        let teslaScore = 0;
        let porscheScore = 0;
        let currentCar = null;
        let gameInterval;
        let gameOver = false;

        function startGame() {
            document.getElementById('gameIntro').style.display = 'none';
            document.getElementById('gameContainer').style.display = 'block';
            spawnCar();
        }

        function spawnCar() {
            // Adjust probabilities: more Tesla than Porsche
            // 60% Renault, 30% Tesla, 10% Porsche
            const random = Math.random();
            let carType;
            
            if (random < 0.6) {
                carType = 'renault';
            } else if (random < 0.9) {
                carType = 'tesla';
            } else {
                carType = 'porsche';
            }
            
            const car = document.createElement('div');
            car.className = 'car';
            car.style.backgroundImage = `url('images/${carType}.png')`;
            car.style.left = '-60px';
            car.style.top = '450px';
            
            document.querySelector('.road').appendChild(car);
            
            currentCar = {
                element: car,
                type: carType
            };

            animateCar(car);
        }

        function animateCar(car) {
            const path = [
                { left: '-60px', top: '450px' },     // Start off-screen
                { left: '100px', top: '450px' },     // Straight section
                { left: '200px', top: '450px' },     // Approach first curve
                { left: '250px', top: '450px' },     // Start curve
                { left: '300px', top: '425px' },     // Curving up
                { left: '325px', top: '375px' },     // Curving up
                { left: '350px', top: '300px' },     // Middle of first curve
                { left: '350px', top: '250px' },     // Straight middle section
                { left: '350px', top: '200px' },     // Straight middle section
                { left: '350px', top: '150px' },     // Approach second curve
                { left: '375px', top: '125px' },     // Start second curve
                { left: '400px', top: '100px' },     // Curving right
                { left: '450px', top: '100px' },     // Finishing curve
                { left: '500px', top: '100px' },     // Straight final section
                { left: '600px', top: '100px' },     // Exit path
                { left: '850px', top: '100px' }      // Off screen
            ];

            let currentPoint = 0;
            
            function moveToNextPoint() {
                if (currentPoint >= path.length) {
                    car.remove();
                    if (currentCar && (currentCar.type === 'tesla' || currentCar.type === 'porsche')) {
                        loseLife();
                    }
                    spawnCar();
                    return;
                }

                const point = path[currentPoint];
                car.style.left = point.left;
                car.style.top = point.top;
                
                // Rotate the car based on its direction
                if (currentPoint > 0) {
                    const prevPoint = path[currentPoint - 1];
                    const dx = parseInt(point.left) - parseInt(prevPoint.left);
                    const dy = parseInt(point.top) - parseInt(prevPoint.top);
                    const angle = Math.atan2(dy, dx) * (180 / Math.PI);
                    car.style.transform = `rotate(${angle}deg)`;
                }
                
                currentPoint++;
                setTimeout(moveToNextPoint, gameSpeed / path.length);
            }

            moveToNextPoint();
        }

        function identifyCar(guess) {
            if (!currentCar) return;
            
            if (currentCar.type === guess) {
                if (guess === 'tesla') teslaScore++;
                if (guess === 'porsche') porscheScore++;
                
                document.getElementById('teslaScore').textContent = teslaScore;
                document.getElementById('porscheScore').textContent = porscheScore;
                
                gameSpeed = Math.max(500, gameSpeed - 50);
            } else {
                loseLife();
            }
            
            currentCar.element.remove();
            currentCar = null;
            spawnCar();
        }

        function loseLife() {
            lives--;
            const livesElements = document.querySelectorAll('.life');
            if (lives >= 0 && livesElements[lives]) {
                livesElements[lives].style.display = 'none';
            }
            
            if (lives <= 0) {
                // Ensure we only call endGame once
                if (currentCar) {
                    currentCar.element.remove();
                    currentCar = null;
                }
                endGame();
            }
        }

        function endGame() {
            // Only proceed if game isn't already over
            if (gameOver) return;
            gameOver = true;
            
            // Clear any existing timeouts or intervals
            clearTimeout(gameInterval);
            
            const message = `No dzisiaj to wygrałeś - widziałam ${teslaScore} tesli i tylko ${porscheScore} porshe... Dobrze, że widzimy się już za ${getCountdown()} <3`;
            
            // Only show popup once
            if (confirm('Podziel się wynikiem?')) {
                window.location.href = `sms:+48603815422&body=${encodeURIComponent(message)}`;
            }
            
            // Hide game container and show countdown immediately
            document.getElementById('gameContainer').style.display = 'none';
            document.getElementById('countdownSection').style.display = 'block';
            updateCountdown();
        }

        function getCountdown() {
            const now = new Date();
            const targetDate = new Date('2024-11-21T17:28:00+01:00');
            const diff = targetDate - now;
            
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((diff % (1000 * 60)) / 1000);
            
            return `${days} dni, ${hours} godzin, ${minutes} minut i ${seconds} sekund`;
        }
    </script>
</body>
</html>
