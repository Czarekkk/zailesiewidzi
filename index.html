<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Basic Meta Tags -->
    <title>Za Ile Się Widzimy?</title>
    <meta name="description" content="Odliczanie do naszego spotkania 💕">
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="favicon.png">
    
    <!-- iOS/iMessage specific -->
    <meta property="og:title" content="Za Ile Się Widzimy?">
    <meta property="og:description" content="Odliczanie do naszego spotkania 💕">
    <meta property="og:image" content="https://zailesiewidzi.my/preview.jpg">
    <meta property="og:url" content="https://zailesiewidzi.my/">
    
    <!-- iOS specific -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #fdf6e3;
            margin: 0;
        }
        #passwordSection, #countdownSection {
            text-align: center;
        }
        #countdownSection {
            display: none;
        }
        #surpriseBox {
            width: 200px;
            height: 200px;
            margin-top: 20px;
            background-color: #ffcc00;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.6s ease;
            transform-style: preserve-3d;
            position: relative;
        }
        #surpriseContent {
            display: none;
            opacity: 0;
            transition: opacity 0.5s ease;
        }
        #jigsawSection {
            text-align: center;
            width: 95vw;
            max-width: 600px;
            margin: 0 auto;
        }
        
        #jigsawSection h2 {
            font-size: clamp(1rem, 4vw, 1.5rem);
            margin: 10px 0;
        }
        
        canvas {
            width: 100%;
            height: auto;
            max-width: 600px;
            border: 2px solid #333;
            touch-action: none;
            margin-top: 10px;
        }
        
        #debugSkip {
            position: fixed;
            bottom: 10px;
            right: 10px;
            padding: 5px;
            font-size: 10px;
            opacity: 0.2;
            background: none;
            border: none;
            cursor: pointer;
        }
        
        #debugSkip:hover {
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <div id="jigsawSection">
        <h2>Rozwiąż zagadkę i dowiedz się, kiedy się widzimy! 💕</h2>
        <canvas id="puzzleCanvas" width="600" height="600"></canvas>
    </div>

    <div id="countdownSection">
        <h2 id="countdownText">Widzimy się już za X dni!</h2>
        <div id="surpriseBox" onclick="showSurprise()">
            <p>Dzisiejsza niespodzianka</p>
        </div>
        <div id="surpriseContent">
            <img src="https://i.giphy.com/media/v1.Y2lkPTc5MGI3NjExMWw1Z2pnb21pYXBkOHhmdHJqajR0eGhuODFwcm5hdXdlejV6NGR2MiZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/6MWahPArixa6I/giphy.gif" alt="Surprise GIF" style="width: 100%; height: auto;">
            <p>Już o jeden dzień mniej do naszego spotkania 🥺</p>
        </div>
    </div>

    <audio id="backgroundMusic" loop>
        <source src="like_i_love_you.mp3" type="audio/mpeg">
    </audio>

    <button id="debugSkip" onclick="skipPuzzle()">⏭️</button>

    <script>
        const canvas = document.getElementById('puzzleCanvas');
        const ctx = canvas.getContext('2d');

        const PUZZLE_DIFFICULTY = 4;
        const PIECE_SIZE = canvas.width / PUZZLE_DIFFICULTY;

        let pieces = [];
        let image = new Image();
        image.src = 'jigsaw-g8.jpg';

        let selectedPiece = null;
        let offsetX, offsetY;

        image.addEventListener('load', initPuzzle);

        function initPuzzle() {
            createPieces();
            shufflePieces();
            drawPuzzle();
            canvas.addEventListener('mousedown', onPuzzleClick);
            canvas.addEventListener('touchstart', onPuzzleClick, { passive: false });
        }

        function createPieces() {
            pieces = [];
            for (let y = 0; y < PUZZLE_DIFFICULTY; y++) {
                for (let x = 0; x < PUZZLE_DIFFICULTY; x++) {
                    pieces.push({
                        sx: x * PIECE_SIZE,
                        sy: y * PIECE_SIZE,
                        x: Math.random() * (canvas.width - PIECE_SIZE),
                        y: Math.random() * (canvas.height - PIECE_SIZE),
                        correctX: x * PIECE_SIZE,
                        correctY: y * PIECE_SIZE,
                    });
                }
            }
        }

        function shufflePieces() {
            pieces = pieces.sort(() => Math.random() - 0.5);
        }

        function drawPuzzle() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            pieces.forEach(piece => {
                ctx.drawImage(
                    image,
                    piece.sx, piece.sy, PIECE_SIZE, PIECE_SIZE,
                    piece.x, piece.y, PIECE_SIZE, PIECE_SIZE
                );
                ctx.strokeRect(piece.x, piece.y, PIECE_SIZE, PIECE_SIZE);
            });
        }

        function onPuzzleClick(e) {
            e.preventDefault();
            const pos = getMousePos(e);
            selectedPiece = getClickedPiece(pos.x, pos.y);
            if (selectedPiece) {
                offsetX = pos.x - selectedPiece.x;
                offsetY = pos.y - selectedPiece.y;
                canvas.addEventListener('mousemove', onPuzzleMove);
                canvas.addEventListener('mouseup', onPuzzleRelease);
                canvas.addEventListener('touchmove', onPuzzleMove, { passive: false });
                canvas.addEventListener('touchend', onPuzzleRelease);
            }
        }

        function onPuzzleMove(e) {
            e.preventDefault();
            const pos = getMousePos(e);
            selectedPiece.x = pos.x - offsetX;
            selectedPiece.y = pos.y - offsetY;
            drawPuzzle();
        }

        function onPuzzleRelease(e) {
            canvas.removeEventListener('mousemove', onPuzzleMove);
            canvas.removeEventListener('mouseup', onPuzzleRelease);
            canvas.removeEventListener('touchmove', onPuzzleMove);
            canvas.removeEventListener('touchend', onPuzzleRelease);
            snapPiece();
            drawPuzzle();
            if (isPuzzleComplete()) {
                setTimeout(() => {
                    document.getElementById("jigsawSection").style.display = "none";
                    document.getElementById("countdownSection").style.display = "block";
                    updateCountdown();
                }, 500);
            }
        }

        function getMousePos(e) {
            const rect = canvas.getBoundingClientRect();
            const event = e.touches ? e.touches[0] : e;
            return {
                x: event.clientX - rect.left,
                y: event.clientY - rect.top
            };
        }

        function getClickedPiece(x, y) {
            for (let i = pieces.length - 1; i >= 0; i--) {
                const piece = pieces[i];
                if (
                    x > piece.x && x < piece.x + PIECE_SIZE &&
                    y > piece.y && y < piece.y + PIECE_SIZE
                ) {
                    return piece;
                }
            }
            return null;
        }

        function snapPiece() {
            if (
                Math.abs(selectedPiece.x - selectedPiece.correctX) < PIECE_SIZE / 2 &&
                Math.abs(selectedPiece.y - selectedPiece.correctY) < PIECE_SIZE / 2
            ) {
                selectedPiece.x = selectedPiece.correctX;
                selectedPiece.y = selectedPiece.correctY;
            }
        }

        function isPuzzleComplete() {
            const complete = pieces.every(piece => 
                piece.x === piece.correctX && piece.y === piece.correctY
            );
            
            if (complete) {
                setTimeout(() => {
                    document.getElementById("jigsawSection").style.display = "none";
                    document.getElementById("countdownSection").style.display = "block";
                    updateCountdown();
                    
                    // Add 4-second delay before opening Spotify
                    setTimeout(() => {
                        window.open('spotify:track:7caj6X6NMX3tlhWnu1du6V', '_blank');
                    }, 4000);
                }, 500);
            }
            return complete;
        }

        function playAudio() {
            const audio = document.getElementById('backgroundMusic');
            audio.play().catch(error => {
                console.log("Audio playback failed:", error);
            });
        }

        function updateCountdown() {
            const today = new Date();
            const targetDate = new Date('2024-11-21T17:28:00+01:00'); // Warsaw time (UTC+1)
            const diffTime = targetDate - today;
            
            const days = Math.floor(diffTime / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diffTime % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((diffTime % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((diffTime % (1000 * 60)) / 1000);
            
            document.getElementById("countdownText").innerText = 
                `Widzimy się już za ${days} dni, ${hours} godzin, ${minutes} minut i ${seconds} sekund!`;
            
            // Update every second
            setTimeout(updateCountdown, 1000);
        }

        function showSurprise() {
            const surpriseBox = document.getElementById("surpriseBox");
            const surpriseContent = document.getElementById("surpriseContent");
            
            playAudio();
            
            surpriseContent.style.display = "block";
            void surpriseContent.offsetWidth;
            
            surpriseContent.style.opacity = "1";
            surpriseBox.style.transform = "rotateY(360deg) scale(0.8)";
            surpriseBox.style.opacity = "0";
            
            setTimeout(() => {
                surpriseBox.style.display = "none";
            }, 600);
        }

        function skipPuzzle() {
            document.getElementById("jigsawSection").style.display = "none";
            document.getElementById("countdownSection").style.display = "block";
            updateCountdown();
            
            // Add 4-second delay before opening Spotify
            setTimeout(() => {
                window.open('spotify:track:7caj6X6NMX3tlhWnu1du6V', '_blank');
            }, 4000);
        }
    </script>
</body>
</html>
