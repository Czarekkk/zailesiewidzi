<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Basic Meta Tags -->
    <title>Za Ile Się Widzimy?</title>
    <meta name="description" content="Odliczanie do naszego spotkania 💕">
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="favicon.png">
    
    <!-- iOS/iMessage specific -->
    <meta property="og:title" content="Za Ile Się Widzimy?">
    <meta property="og:description" content="Odliczanie do naszego spotkania 💕">
    <meta property="og:image" content="https://zailesiewidzi.my/preview.jpg">
    <meta property="og:url" content="https://zailesiewidzi.my/">
    
    <!-- iOS specific -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #fdf6e3;
            margin: 0;
        }

        /* Memory game styles */
        .game-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            max-width: 600px;
            margin: 20px auto;
            padding: 10px;
        }

        .card {
            aspect-ratio: 1;
            background: #ddd;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.6s;
            transform-style: preserve-3d;
            position: relative;
            -webkit-tap-highlight-color: transparent;
        }

        .card.flipped {
            transform: rotateY(180deg);
        }

        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
        }

        .card-front {
            background: #2196F3;
        }

        .card-back {
            background: white;
            transform: rotateY(180deg);
        }

        .card img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
        }

        /* Countdown section styles */
        #countdownSection {
            text-align: center;
            display: none;
        }

        #surpriseBox {
            width: 200px;
            height: 200px;
            margin-top: 20px;
            background-color: #ffcc00;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.6s ease;
            transform-style: preserve-3d;
            position: relative;
        }

        /* Previous games section */
        .previous-games {
            margin-top: 30px;
            text-align: center;
        }

        .previous-games h3 {
            color: #333;
            margin-bottom: 15px;
        }

        .previous-games a {
            display: inline-block;
            margin: 10px;
            padding: 10px 20px;
            background: #ffcc00;
            color: black;
            text-decoration: none;
            border-radius: 5px;
            transition: background 0.3s;
        }

        .previous-games a:hover {
            background: #ffd633;
        }

        .popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: transform 0.3s;
            z-index: 1000;
        }

        .popup.show {
            transform: translate(-50%, -50%) scale(1);
        }

        .popup img {
            width: 150px;
            height: 150px;
            object-fit: cover;
            border-radius: 50%;
            margin-bottom: 10px;
        }

        .popup p {
            margin: 10px 0;
            font-size: 1.2em;
            text-align: center;
        }

        #memoryGameSection {
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
        }

        #surpriseContent {
            display: none;
            text-align: center;
            margin-top: 20px;
        }

        .skip-button {
            display: block;
            margin: 20px auto;
            padding: 10px 20px;
            background: #ffcc00;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        .skip-button:hover {
            background: #ffd633;
        }
    </style>
</head>
<body>
    <div id="memoryGameSection">
        <div class="game-container" id="gameContainer"></div>
        
        <div class="popup" id="wrongPopup">
            <img src="images/sad-face.png" alt="Ups!">
            <p>Ups, spróbuj jeszcze raz!</p>
        </div>
        
        <div class="popup" id="correctPopup">
            <img src="images/happy-face.png" alt="Brawo!">
            <p>Brawo, dostajesz buziaka!</p>
        </div>
        <button onclick="checkPassword()" class="skip-button">Pomiń grę</button>
    </div>

    <div id="countdownSection" style="display: none;">
        <h2 id="countdownText">Widzimy się już za X dni!</h2>
        <div id="surpriseBox" onclick="showSurprise()">
            <p>Dzisiejsza niespodzianka</p>
        </div>
        <div id="surpriseContent" style="display: none;">
            <img src="https://i.giphy.com/media/v1.Y2lkPTc5MGI3NjExZXh0Y3ZhNTI5ZXRkNXhxYm02eXBkYmM4NTc5Z24wOWFhN3Vrd3h2diZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/c76IJLufpNwSULPk77/giphy.gif" alt="Surprise GIF" style="width: 100%; height: auto;">
            <p>Już o jeden dzień mniej do naszego spotkania 🥺</p>
            <button onclick="openSpotifySong()" style="background-color: #1DB954; color: white; border: none; padding: 10px 20px; border-radius: 20px; font-size: 16px; cursor: pointer; margin-top: 10px; transition: background-color 0.3s ease;">
                Odbierz piosenkę w prezencie 🎵
            </button>
        </div>
        <div class="previous-games">
            <h3>Zagraj w gry z poprzednich dni:</h3>
            <a href="questionnaire.html">Quiz o Czarku</a>
            <a href="whackatesla.html">Whack-a-Tesla</a>
            <a href="wheel.html">Koło Fortuny</a>
        </div>
    </div>

    <audio id="backgroundMusic" loop>
        <source src="like_i_love_you.mp3" type="audio/mpeg">
    </audio>

    <script>
        // Memory game code
        const images = [
            'images/card1.png',
            'images/card2.png',
            'images/card3.png',
            'images/card4.png',
            'images/card5.png',
            'images/card6.png',
            'images/card7.png',
            'images/card8.png'
        ];

        let flippedCards = [];
        let matchedPairs = 0;

        const wrongMessages = [
            "Ups, spróbuj jeszcze raz!",
            "Znowu źle, chcesz się bić?",
            "Nieeee no idziesz do domu...",
            "Za marzenia nie karają"
        ];

        const correctMessages = [
            "Brawo, dostajesz buziaka!",
            "Idziesz do domu... ale mojego!",
            "Mmmm... Ale zdolna niunia!"
        ];

        function createCard(imageUrl) {
            const card = document.createElement('div');
            card.className = 'card';
            
            const front = document.createElement('div');
            front.className = 'card-front';
            
            const back = document.createElement('div');
            back.className = 'card-back';
            
            const img = document.createElement('img');
            img.src = imageUrl;
            back.appendChild(img);
            
            card.appendChild(front);
            card.appendChild(back);
            
            return card;
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function initializeGame() {
            const gameContainer = document.getElementById('gameContainer');
            const cardPairs = [...images, ...images];
            shuffleArray(cardPairs);

            cardPairs.forEach(imageUrl => {
                const card = createCard(imageUrl);
                card.addEventListener('click', () => flipCard(card, imageUrl));
                gameContainer.appendChild(card);
            });
        }

        function flipCard(card, imageUrl) {
            if (flippedCards.length === 2 || card.classList.contains('flipped')) return;

            card.classList.add('flipped');
            flippedCards.push({ card, imageUrl });

            if (flippedCards.length === 2) {
                setTimeout(checkMatch, 1000);
            }
        }

        function showPopup(popupId) {
            const popup = document.getElementById(popupId);
            
            if (popupId === 'wrongPopup') {
                const randomIndex = Math.floor(Math.random() * wrongMessages.length);
                popup.querySelector('p').textContent = wrongMessages[randomIndex];
            } else if (popupId === 'correctPopup') {
                const randomIndex = Math.floor(Math.random() * correctMessages.length);
                popup.querySelector('p').textContent = correctMessages[randomIndex];
            }
            
            popup.classList.add('show');
            setTimeout(() => {
                popup.classList.remove('show');
            }, 1500);
        }

        function checkMatch() {
            const [first, second] = flippedCards;
            if (first.imageUrl === second.imageUrl) {
                matchedPairs++;
                showPopup('correctPopup');
                if (matchedPairs === images.length) {
                    setTimeout(() => {
                        document.getElementById('memoryGameSection').style.display = 'none';
                        document.getElementById('countdownSection').style.display = 'block';
                        updateCountdown();
                    }, 1500);
                }
            } else {
                showPopup('wrongPopup');
                setTimeout(() => {
                    first.card.classList.remove('flipped');
                    second.card.classList.remove('flipped');
                }, 1500);
            }
            flippedCards = [];
        }

        // Initialize the game immediately
        initializeGame();

        // Add these functions at the end of your script section
        function updateCountdown() {
            const now = new Date();
            const targetDate = new Date('2024-11-21T17:28:00+01:00');
            const diff = targetDate - now;
            
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((diff % (1000 * 60)) / 1000);
            
            document.getElementById('countdownText').textContent = 
                `Widzimy się już za ${days} dni, ${hours} godzin, ${minutes} minut i ${seconds} sekund!`;
            
            setTimeout(updateCountdown, 1000);
        }

        function showSurprise() {
            const music = document.getElementById('backgroundMusic');
            const surpriseBox = document.getElementById('surpriseBox');
            music.play();
            surpriseBox.style.display = 'none'; // Hide the surprise box
            document.getElementById('surpriseContent').style.display = 'block';
        }

        function openSpotifySong() {
            window.location.href = "https://open.spotify.com/track/0QyZs8T7Pl6T3bm1DiRqkU?si=_7XC98a4TRGEc-9TH7WLbw";
        }

        function checkPassword() {
            const password = prompt("Podaj hasło:");
            if (password === "niunia") {
                document.getElementById('memoryGameSection').style.display = 'none';
                document.getElementById('countdownSection').style.display = 'block';
                updateCountdown();
            } else {
                window.location.href = "https://www.youtube.com/watch?v=dQw4w9WgXcQ";
            }
        }
    </script>
</body>
</html>
