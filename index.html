<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Basic Meta Tags -->
    <title>Za Ile Się Widzimy?</title>
    <meta name="description" content="Odliczanie do naszego spotkania 💕">
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="favicon.png">
    
    <!-- iOS/iMessage specific -->
    <meta property="og:title" content="Za Ile Się Widzimy?">
    <meta property="og:description" content="Odliczanie do naszego spotkania 💕">
    <meta property="og:image" content="https://zailesiewidzi.my/preview.jpg">
    <meta property="og:url" content="https://zailesiewidzi.my/">
    
    <!-- iOS specific -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #fdf6e3;
            margin: 0;
        }
        #passwordSection, #countdownSection {
            text-align: center;
        }
        #countdownSection {
            display: none;
        }
        #surpriseBox {
            width: 200px;
            height: 200px;
            margin-top: 20px;
            background-color: #ffcc00;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.6s ease;
            transform-style: preserve-3d;
            position: relative;
        }
        #surpriseContent {
            display: none;
            opacity: 0;
            transition: opacity 0.5s ease;
        }
        #jigsawSection {
            text-align: center;
        }
        
        #passwordSection {
            display: none;  /* Hide the password input initially */
        }
        
        canvas {
            border: 2px solid #333;
            touch-action: none;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div id="jigsawSection">
        <h2>Chcesz się bić?</h2>
        <canvas id="puzzleCanvas" width="600" height="600"></canvas>
    </div>

    <div id="countdownSection">
        <h2 id="countdownText">Widzimy się już za X dni!</h2>
        <div id="surpriseBox" onclick="showSurprise()">
            <p>Dzisiejsza niespodzianka</p>
        </div>
        <div id="surpriseContent">
            <img src="https://media.giphy.com/media/l4FGpP4lxGGgK5CBW/giphy.gif" alt="Surprise GIF" style="width: 100%; height: auto;">
            <p>Nie mogę się doczekać 🥺</p>
        </div>
    </div>

    <audio id="backgroundMusic" loop>
        <source src="like_i_love_you.mp3" type="audio/mpeg">
    </audio>

    <script>
        function playAudio() {
            const audio = document.getElementById('backgroundMusic');
            audio.play().catch(error => {
                console.log("Audio playback failed:", error);
            });
        }

        function isPuzzleComplete() {
            const complete = pieces.every(piece => 
                piece.x === piece.correctX && piece.y === piece.correctY
            );
            
            if (complete) {
                setTimeout(() => {
                    document.getElementById("jigsawSection").style.display = "none";
                    document.getElementById("countdownSection").style.display = "block";
                    updateCountdown();
                }, 500);
            }
            return complete;
        }

        function updateCountdown() {
            const today = new Date();
            const targetDate = new Date('2024-11-21');
            const diffTime = targetDate - today;
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            document.getElementById("countdownText").innerText = `Widzimy się już za ${diffDays} dni!`;
        }

        function showSurprise() {
            const surpriseBox = document.getElementById("surpriseBox");
            const surpriseContent = document.getElementById("surpriseContent");
            
            playAudio();
            
            surpriseContent.style.display = "block";
            void surpriseContent.offsetWidth;
            
            surpriseContent.style.opacity = "1";
            surpriseBox.style.transform = "rotateY(360deg) scale(0.8)";
            surpriseBox.style.opacity = "0";
            
            setTimeout(() => {
                surpriseBox.style.display = "none";
            }, 600);
        }
    </script>
</body>
</html>
