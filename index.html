<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Basic Meta Tags -->
    <title>Za Ile Się Widzimy?</title>
    <meta name="description" content="Odliczanie do naszego spotkania 💕">
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="favicon.png">
    
    <!-- iOS/iMessage specific -->
    <meta property="og:title" content="Za Ile Się Widzimy?">
    <meta property="og:description" content="Odliczanie do naszego spotkania 💕">
    <meta property="og:image" content="https://zailesiewidzi.my/preview.jpg">
    <meta property="og:url" content="https://zailesiewidzi.my/">
    
    <!-- iOS specific -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <meta name="mobile-web-app-capable" content="yes">
    
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #fdf6e3;
            margin: 0;
        }

        /* Memory game styles */
        .game-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            max-width: 600px;
            margin: 20px auto;
            padding: 10px;
        }

        .card {
            aspect-ratio: 1;
            background: #ddd;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.6s;
            transform-style: preserve-3d;
            position: relative;
            -webkit-tap-highlight-color: transparent;
        }

        .card.flipped {
            transform: rotateY(180deg);
        }

        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
        }

        .card-front {
            background: #2196F3;
        }

        .card-back {
            background: white;
            transform: rotateY(180deg);
        }

        .card img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
        }

        /* Countdown section styles */
        #countdownSection {
            text-align: center;
            max-width: 800px;
            margin: 20px auto;
            padding: 20px;
        }

        #countdownText {
            font-size: 24px;
            margin: 20px 0;
            padding: 20px;
            background: rgba(255,255,255,0.9);
            border-radius: 10px;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        #surpriseBox {
            width: 200px;
            height: 200px;
            margin: 20px auto;
            background-color: #ffcc00;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        #surpriseContent {
            margin-top: 20px;
            padding: 20px;
        }

        #surpriseContent img {
            max-width: 100%;
            height: auto;
            border-radius: 10px;
        }

        .previous-games {
            margin-top: 30px;
            padding: 20px;
        }

        .previous-games h3 {
            margin-bottom: 15px;
        }

        .previous-games a {
            display: inline-block;
            margin: 10px;
            padding: 10px 20px;
            background: #ffcc00;
            color: black;
            text-decoration: none;
            border-radius: 5px;
            transition: background 0.3s;
        }

        .previous-games a:hover {
            background: #ffd633;
        }

        .popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: transform 0.3s;
            z-index: 1000;
        }

        .popup.show {
            transform: translate(-50%, -50%) scale(1);
        }

        .popup img {
            width: 150px;
            height: 150px;
            object-fit: cover;
            border-radius: 50%;
            margin-bottom: 10px;
        }

        .popup p {
            margin: 10px 0;
            font-size: 1.2em;
            text-align: center;
        }

        #memoryGameSection {
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
        }

        .skip-button {
            display: block;
            margin: 20px auto;
            padding: 10px 20px;
            background: #ffcc00;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        .skip-button:hover {
            background: #ffd633;
        }

        #gameIntro {
            text-align: center;
            max-width: 600px;
            margin: 20px auto;
            padding: 20px;
        }

        #gameContainer {
            position: relative;
            width: 800px;
            height: 800px;
            margin: 20px auto;
            display: flex;
            flex-direction: column;
        }

        .road-container {
            position: relative;
            width: 100%;
            height: 600px;
            background: #fff;
            border-radius: 10px;
            overflow: hidden;
        }

        .road {
            width: 100%;
            height: 100%;
            background: url('images/road-curve.png') no-repeat center;
            background-size: contain;
            position: relative;
        }

        .car {
            position: absolute;
            width: 120px;
            height: 60px;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            transition: left 0.5s linear, top 0.5s linear, transform 0.5s linear;
            -webkit-tap-highlight-color: transparent;
        }

        .scoreboard {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background: rgba(255,255,255,0.9);
            border-radius: 10px;
            margin-bottom: 20px;
            z-index: 2;
            position: relative;
        }

        .lives {
            display: flex;
            gap: 10px;
        }

        .life {
            width: 30px;
            height: 30px;
            background: url('images/ferrari.png') no-repeat center;
            background-size: contain;
            display: inline-block;
        }

        .game-buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 20px;
            margin-top: 20px;
            width: 100%;
            box-sizing: border-box;
        }

        .game-button {
            padding: 15px 30px;
            font-size: 18px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            background: #ffcc00;
        }

        .game-button:hover {
            background: #ffd633;
        }

        /* Make sure everything stays responsive */
        @media (max-width: 600px) {
            #countdownSection {
                padding: 10px;
            }

            #countdownText {
                font-size: 20px;
                padding: 15px;
            }

            #surpriseBox {
                width: 150px;
                height: 150px;
            }

            .previous-games a {
                margin: 5px;
                padding: 8px 16px;
            }
        }

        #flappyGame {
            position: relative;
            width: 400px;
            height: 600px;
            margin: 20px auto;
            overflow: hidden;
            background: #70c5ce;
            border-radius: 10px;
            display: none;
        }

        .bird {
            position: absolute;
            width: 40px;
            height: 30px;
            background: url('images/bird.png') no-repeat center center;
            background-size: contain;
            transition: transform 0.1s;
        }

        .pipe {
            position: absolute;
            width: 60px;
            background: #2ecc71;
        }

        .score-display {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 40px;
            font-weight: bold;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            z-index: 10;
        }

        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255,255,255,0.95);
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            display: none;
            z-index: 1000;
            box-shadow: 0 0 20px rgba(0,0,0,0.2);
        }

        .high-score-display {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 24px;
            font-weight: bold;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            z-index: 10;
        }

        .game-over button {
            margin: 10px;
            padding: 10px 20px;
            background: #ffcc00;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        .game-over button:hover {
            background: #ffd633;
        }

        .game-over button {
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
        }

        #surpriseBox, #surpriseContent button {
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
        }

        #surpriseBox:hover, #surpriseContent button:hover {
            background-color: #ffd633;
        }
    </style>
</head>
<body>
    <div id="gameIntro" style="text-align: center; margin: 20px;">
        <h2>Zagraj w Niunia Bird!</h2>
        <p>Kliknij spację lub dotknij ekranu, aby zacząć grę.</p>
        <button onclick="startFlappyBird()" class="game-button">Start!</button>
    </div>

    <div id="flappyGame">
        <div class="score-display">0</div>
        <div class="high-score-display">Best: 0</div>
        <div class="bird"></div>
        <div class="game-over">
            <h2>Koniec gry!</h2>
            <p>Twój wynik: <span class="final-score">0</span></p>
            <p>Najlepszy wynik: <span class="best-score">0</span></p>
            <button class="game-button" ontouchstart="restartGame()" onclick="restartGame()">Zagraj jeszcze raz</button>
            <button class="game-button" ontouchstart="proceedToCountdown()" onclick="proceedToCountdown()">Przejdź dalej</button>
        </div>
    </div>

    <div id="countdownSection" style="display: none;">
        <h2 id="countdownText">Widzimy się już za X dni!</h2>
        <p id="gptComparison" style="font-style: italic; margin: 20px 0; padding: 10px; background: rgba(255,255,255,0.7); border-radius: 5px;">
            <!-- GPT response will be inserted here -->
        </p>
        <div id="surpriseBox" ontouchstart="showSurprise(event)" onclick="showSurprise(event)">
            <p>Dzisiejsza niespodzianka</p>
        </div>
        <div id="surpriseContent" style="display: none;">
            <img src="https://i.giphy.com/media/v1.Y2lkPTc5MGI3NjExc2p0Z3Z6dTdkOHhzajI2bjFqcWt1a3pjZjI0ZHdjMDZpbnFrNTg4cyZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/l4pTdcifPZLpDjL1e/giphy.gif" alt="Surprise GIF">
            <p>Już naprawdę niedługo! 🥺</p>
            <button ontouchstart="openSpotifySong(event)" onclick="openSpotifySong(event)" 
                    style="background-color: #1DB954; color: white; border: none; padding: 10px 20px; border-radius: 20px; font-size: 16px; cursor: pointer; margin-top: 10px; transition: background-color 0.3s ease;">
                Odbierz piosenkę w prezencie 🎵
            </button>
        </div>
        <div class="previous-games">
            <h3>Zagraj w gry z poprzednich dni:</h3>
            <a href="questionnaire.html">Quiz o Czarku</a>
            <a href="whackatesla.html">Whack-a-Tesla</a>
            <a href="wheel.html">Koło Fortuny</a>
            <a href="memory-game.html">Memory Game</a>
        </div>
    </div>

    <audio id="backgroundMusic" loop>
        <source src="until-i-found-you.mp3" type="audio/mpeg">
    </audio>

    <!-- Game sound effects -->
    <audio id="bounceSound" preload="auto">
        <source src="sounds/bounce.mp3" type="audio/mpeg">
    </audio>
    <audio id="upsSound" preload="auto">
        <source src="sounds/ups.mp3" type="audio/mpeg">
    </audio>
    <audio id="tryagainSound" preload="auto">
        <source src="sounds/tryagain.mp3" type="audio/mpeg">
    </audio>

    <!-- Success sounds (will be randomly selected) -->
    <audio id="brawoSound" preload="auto">
        <source src="sounds/brawo.mp3" type="audio/mpeg">
    </audio>
    <audio id="niezleSound" preload="auto">
        <source src="sounds/niezle.mp3" type="audio/mpeg">
    </audio>
    <audio id="superSound" preload="auto">
        <source src="sounds/super.mp3" type="audio/mpeg">
    </audio>

    <script>
        let bird;
        let pipes = [];
        let score = 0;
        let gameActive = false;
        let gravity = 0.5;
        let jump = -8;
        let birdVelocity = 0;
        let gameLoop;
        let highScore = parseInt(localStorage.getItem('flappyHighScore')) || 0;
        const successSounds = ['brawoSound', 'niezleSound', 'superSound'];
        const MIN_PIPE_DISTANCE = 200;  // Minimum distance between pipes
        const MAX_PIPE_DISTANCE = 300;  // Maximum distance between pipes
        let lastPipePosition = -1;  // Track the position of the last pipe

        // Sound functions need to be defined before they're used
        function playSound(soundId) {
            const sound = document.getElementById(soundId);
            if (sound) {
                sound.currentTime = 0; // Reset sound to start
                sound.play().catch(error => {
                    console.log('Sound play failed:', error);
                });
            }
        }

        function playRandomSuccessSound() {
            const randomSound = successSounds[Math.floor(Math.random() * successSounds.length)];
            playSound(randomSound);
        }

        function startFlappyBird() {
            document.getElementById('gameIntro').style.display = 'none';
            document.getElementById('flappyGame').style.display = 'block';
            initGame();
        }

        function handleJump(e) {
            // Prevent default behavior for touch events
            if (e.type === 'touchstart') {
                e.preventDefault();
            }
            
            // Only handle space key for keyboard events
            if (e.type === 'keydown' && e.code !== 'Space') {
                return;
            }
            
            if (!gameActive) return;
            
            // Apply upward velocity to the bird
            birdVelocity = jump;
            
            // Play bounce sound
            playSound('bounceSound');
        }

        function initGame() {
            bird = document.querySelector('.bird');
            bird.style.left = '50px';
            bird.style.top = '250px';
            score = 0;
            birdVelocity = 0;
            gameActive = true;
            pipes = [];
            lastPipePosition = -1;  // Reset last pipe position
            document.querySelector('.score-display').textContent = '0';
            document.querySelector('.game-over').style.display = 'none';
            
            // Clear existing pipes
            document.querySelectorAll('.pipe').forEach(pipe => pipe.remove());
            
            // Start game loop
            gameLoop = setInterval(updateGame, 20);
            setTimeout(createPipe, 0);
            
            // Event listeners for all control types
            document.addEventListener('keydown', handleJump);
            document.addEventListener('touchstart', handleJump);
            document.addEventListener('mousedown', handleJump);
            
            // Remove event listeners when game ends
            document.addEventListener('touchend', (e) => e.preventDefault());
            
            // Update high score display
            document.querySelector('.high-score-display').textContent = `Best: ${highScore}`;
        }

        function createPipe() {
            if (!gameActive) return;
            
            // Check if we're too close to the last pipe
            if (lastPipePosition !== -1 && lastPipePosition > 400 - MIN_PIPE_DISTANCE) {
                setTimeout(createPipe, 100);  // Check again in 100ms
                return;
            }
            
            const gapHeight = 150;  // Fixed gap height that's comfortable to pass through
            
            // Ensure the gap is never too close to the top or bottom
            const minGapTop = 100;  // Minimum distance from top
            const maxGapTop = 400;  // Maximum distance from top
            const gapPosition = Math.random() * (maxGapTop - minGapTop) + minGapTop;
            
            const topPipe = document.createElement('div');
            topPipe.className = 'pipe';
            topPipe.style.height = gapPosition + 'px';
            topPipe.style.top = '0';
            topPipe.style.left = '400px';
            
            const bottomPipe = document.createElement('div');
            bottomPipe.className = 'pipe';
            bottomPipe.style.height = (600 - gapPosition - gapHeight) + 'px';
            bottomPipe.style.bottom = '0';
            bottomPipe.style.left = '400px';
            
            document.getElementById('flappyGame').appendChild(topPipe);
            document.getElementById('flappyGame').appendChild(bottomPipe);
            
            pipes.push({ top: topPipe, bottom: bottomPipe, passed: false });
            lastPipePosition = 400;  // Reset last pipe position
            
            // Calculate random delay for next pipe within our min/max bounds
            const randomDelay = Math.random() * (MAX_PIPE_DISTANCE - MIN_PIPE_DISTANCE) + MIN_PIPE_DISTANCE;
            
            // Adjust delay based on score (gets slightly faster as score increases)
            const speedMultiplier = Math.max(0.7, 1 - (score * 0.02));  // Caps at 30% faster
            const finalDelay = randomDelay * speedMultiplier;
            
            setTimeout(createPipe, finalDelay);
        }

        function updateGame() {
            if (!gameActive) return;
            
            // Update bird position
            birdVelocity += gravity;
            const birdTop = parseFloat(bird.style.top);
            const newTop = birdTop + birdVelocity;
            
            // Keep bird within game bounds
            if (newTop < 0) {
                bird.style.top = '0px';
                birdVelocity = 0;
            } else if (newTop > 570) {
                bird.style.top = '570px';
                endGame();
            } else {
                bird.style.top = newTop + 'px';
            }
            
            // Rotate bird based on velocity (diving animation)
            const rotation = Math.min(Math.max(birdVelocity * 3, -30), 90);
            bird.style.transform = `rotate(${rotation}deg)`;
            
            // Update pipes
            pipes.forEach((pipe, index) => {
                const pipeLeft = parseFloat(pipe.top.style.left);
                // Adjust pipe speed based on score (starts slower, gradually speeds up)
                const pipeSpeed = Math.min(4, 2 + (score * 0.1));
                const newLeft = pipeLeft - pipeSpeed;
                
                pipe.top.style.left = newLeft + 'px';
                pipe.bottom.style.left = newLeft + 'px';
                
                // Update last pipe position tracking
                if (index === pipes.length - 1) {
                    lastPipePosition = newLeft;
                }
                
                // Check collision
                if (checkCollision(pipe)) {
                    playSound('upsSound');
                    endGame();
                    return;
                }
                
                // Update score
                if (!pipe.passed && newLeft < 50) {
                    pipe.passed = true;
                    score++;
                    document.querySelector('.score-display').textContent = score;
                    
                    // Play success sound only every 5 points
                    if (score % 5 === 0) {
                        playRandomSuccessSound();
                    }
                    
                    if (score > highScore) {
                        highScore = score;
                        document.querySelector('.high-score-display').textContent = `Best: ${highScore}`;
                    }
                }
                
                // Remove off-screen pipes
                if (newLeft < -60) {
                    pipe.top.remove();
                    pipe.bottom.remove();
                    pipes.splice(index, 1);
                }
            });
        }

        function checkCollision(pipe) {
            const birdRect = bird.getBoundingClientRect();
            const topPipeRect = pipe.top.getBoundingClientRect();
            const bottomPipeRect = pipe.bottom.getBoundingClientRect();
            
            return (
                birdRect.right > topPipeRect.left &&
                birdRect.left < topPipeRect.right && (
                    birdRect.top < topPipeRect.bottom ||
                    birdRect.bottom > bottomPipeRect.top
                )
            );
        }

        function endGame() {
            gameActive = false;
            clearInterval(gameLoop);
            
            // Update high score if necessary
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('flappyHighScore', highScore);
            }
            
            // Update displays
            document.querySelector('.final-score').textContent = score;
            document.querySelector('.best-score').textContent = highScore;
            document.querySelector('.high-score-display').textContent = `Best: ${highScore}`;
            
            // Show game over screen and play sound
            document.querySelector('.game-over').style.display = 'block';
            playSound('tryagainSound');
        }

        function restartGame(e) {
            // Prevent default behavior if it's a touch event
            if (e && e.type === 'touchstart') {
                e.preventDefault();
            }
            initGame();
        }

        async function getGPTComparison(timeString) {
            try {
                // Use the correct path to your API endpoint
                const response = await fetch('api/gpt', {  // or '/api/gpt' depending on your setup
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ timeString })
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const data = await response.json();
                console.log('GPT Response:', data); // For debugging
                return data.response;
            } catch (error) {
                console.error('Error:', error);
                // Provide a fallback response if the API call fails
                return 'To tyle czasu, ile potrzeba na przeczytanie wszystkich książek Harry\'ego Pottera!';
            }
        }

        async function proceedToCountdown(e) {
            // Prevent default behavior if it's a touch event
            if (e && e.type === 'touchstart') {
                e.preventDefault();
            }
            
            document.getElementById('flappyGame').style.display = 'none';
            document.getElementById('countdownSection').style.display = 'block';
            
            // Start playing background music
            const backgroundMusic = document.getElementById('backgroundMusic');
            if (backgroundMusic) {
                backgroundMusic.volume = 0.5; // Set volume to 50%
                backgroundMusic.play().catch(error => {
                    console.log('Music play failed:', error);
                });
            }
            
            // Get initial countdown text for GPT comparison
            const now = new Date();
            const targetDate = new Date('2024-11-21T17:28:00+01:00');
            const diff = targetDate - now;
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((diff % (1000 * 60)) / 1000);
            
            const timeString = `${days} dni, ${hours} godzin, ${minutes} minut i ${seconds} sekund`;
            
            try {
                // Get GPT comparison
                const gptResponse = await getGPTComparison(timeString);
                
                // Store GPT response in localStorage to avoid making multiple requests
                if (gptResponse) {
                    localStorage.setItem('gptComparison', gptResponse);
                    document.getElementById('gptComparison').textContent = gptResponse;
                }
            } catch (error) {
                console.error('Error getting GPT comparison:', error);
                // Use fallback if stored comparison exists
                const storedComparison = localStorage.getItem('gptComparison');
                if (storedComparison) {
                    document.getElementById('gptComparison').textContent = storedComparison;
                }
            }
            
            updateCountdown();
        }

        function updateCountdown() {
            const now = new Date();
            const targetDate = new Date('2024-11-21T17:28:00+01:00');
            const diff = targetDate - now;
            
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((diff % (1000 * 60)) / 1000);
            
            const timeString = `${days} dni, ${hours} godzin, ${minutes} minut i ${seconds} sekund`;
            document.getElementById('countdownText').textContent = `Widzimy się już za ${timeString}!`;
            
            // Get stored GPT comparison if it exists
            const storedComparison = localStorage.getItem('gptComparison');
            if (storedComparison) {
                document.getElementById('gptComparison').textContent = storedComparison;
            }
            
            setTimeout(updateCountdown, 1000);
        }

        function showSurprise(e) {
            // Prevent default behavior if it's a touch event
            if (e && e.type === 'touchstart') {
                e.preventDefault();
            }
            const surpriseBox = document.getElementById('surpriseBox');
            const surpriseContent = document.getElementById('surpriseContent');
            
            surpriseBox.style.display = 'none';
            surpriseContent.style.display = 'block';
        }

        function openSpotifySong(e) {
            // Prevent default behavior if it's a touch event
            if (e && e.type === 'touchstart') {
                e.preventDefault();
            }
            window.open('https://open.spotify.com/track/5FmTAZVK4O1rDBGn0RYd7t?si=WotckdUdRCaZvaLdfaCoXg&context=spotify%3Aalbum%3A2oPA8Q5sam7nqBCxPjxbK7', '_blank');
        }

        // Add a function to control music (optional)
        function toggleBackgroundMusic() {
            const backgroundMusic = document.getElementById('backgroundMusic');
            if (backgroundMusic.paused) {
                backgroundMusic.play();
            } else {
                backgroundMusic.pause();
            }
        }
    </script>
</body>
</html>
