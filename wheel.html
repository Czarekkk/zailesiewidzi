<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Koło Fortuny</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #fdf6e3;
        }

        .wheel-container {
            position: relative;
            width: 300px;
            height: 300px;
            margin: 20px;
        }

        .wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            position: relative;
            transition: transform 4s cubic-bezier(0.17, 0.67, 0.12, 0.99);
            transform: rotate(0deg);
            background: conic-gradient(
                #ff6b6b 0% 20%,
                #4ecdc4 20% 40%,
                #45b7d1 40% 60%,
                #96ceb4 60% 80%,
                #ff9999 80% 100%
            );
        }

        .pointer {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 20px;
            height: 40px;
            z-index: 2;
            color: #333;
            font-size: 30px;
        }

        .option {
            position: absolute;
            left: 50%;
            top: 50%;
            transform-origin: 0 0;
            width: 140px; /* Half of wheel width */
            text-align: left;
            padding-left: 20px;
            color: white;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
            font-size: 14px;
            line-height: 1.2;
        }

        .spin-button {
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 18px;
            cursor: pointer;
            background-color: #ffcc00;
            border: none;
            border-radius: 5px;
        }

        .result-modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.3);
            text-align: center;
        }

        .retry-button {
            margin-top: 10px;
            padding: 8px 16px;
            background-color: #ffcc00;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="wheel-container">
        <div class="pointer">▼</div>
        <div class="wheel" id="wheel">
            <div class="option" style="transform: rotate(0deg) translate(0, -50%)">69 buziaków od Czarka</div>
            <div class="option" style="transform: rotate(72deg) translate(0, -50%)">Odblokowanie piosenki na playliście</div>
            <div class="option" style="transform: rotate(144deg) translate(0, -50%)">Wysłanie wiadomości do swojego WSPANIAŁEGO chłopaka</div>
            <div class="option" style="transform: rotate(216deg) translate(0, -50%)">Jedno Ferrerko</div>
            <div class="option" style="transform: rotate(288deg) translate(0, -50%)">Białe Porsche 911 cabrio</div>
        </div>
    </div>
    <button class="spin-button" onclick="spinWheel()">Zakręć kołem!</button>

    <div class="result-modal" id="resultModal">
        <h3 id="prizeText"></h3>
        <button class="retry-button" onclick="closeModal()">Chcesz spróbować ponownie?</button>
    </div>

    <script>
        const prizes = [
            "69 buziaków od Czarka",
            "Odblokowanie piosenki na playliście",
            "Wysłanie wiadomości do swojego WSPANIAŁEGO chłopaka",
            "Jedno Ferrerko",
            "Białe Porsche 911 cabrio"
        ];

        let canSpin = true;

        function spinWheel() {
            if (!canSpin) return;
            canSpin = false;

            const wheel = document.getElementById('wheel');
            
            // Reset wheel position
            wheel.style.transition = 'none';
            wheel.style.transform = 'rotate(0deg)';
            void wheel.offsetWidth;
            wheel.style.transition = 'transform 4s cubic-bezier(0.17, 0.67, 0.12, 0.99)';
            
            // Define prize sectors based on the colored areas
            // Each sector is 72 degrees (360/5), centered on the arrow
            const sectors = [
                { prize: 0, start: -36, end: 36 },     // 69 buziaków (top)
                { prize: 1, start: 36, end: 108 },     // Piosenka
                { prize: 2, start: 108, end: 180 },    // Wiadomość
                { prize: 3, start: 180, end: 252 },    // Ferrerko
                // Porsche sector: 252 to 324 (excluded)
            ];
            
            // Select random sector (excluding Porsche)
            const selectedSector = sectors[Math.floor(Math.random() * sectors.length)];
            
            // Calculate random position within the selected sector
            const randomDegree = selectedSector.start + Math.random() * (selectedSector.end - selectedSector.start);
            
            // Calculate final rotation (counterclockwise)
            const finalPosition = -randomDegree;  // Simplified rotation calculation
            const fullRotations = 4 * 360;
            const finalRotation = -(fullRotations) + finalPosition;
            
            // Apply spin
            wheel.style.transform = `rotate(${finalRotation}deg)`;

            // Show result after spin
            setTimeout(() => {
                showResult(selectedSector.prize);
            }, 4000);
        }

        function showResult(prizeIndex) {
            const modal = document.getElementById('resultModal');
            const prizeText = document.getElementById('prizeText');
            prizeText.textContent = `Wygrywasz: ${prizes[prizeIndex]}!`;
            modal.style.display = 'block';

            if (prizeIndex === 2) { // Message option
                const messageText = "Hej kochanie! Wygrałam możliwość napisania do Ciebie wiadomości! 🥰";
                const encodedMessage = encodeURIComponent(messageText);
                window.location.href = `sms:+48729995462&body=${encodedMessage}`;
            }
        }

        function closeModal() {
            document.getElementById('resultModal').style.display = 'none';
            canSpin = true;
        }
    </script>
</body>
</html>
