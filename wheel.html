<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Koło Fortuny</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #fdf6e3;
        }

        .wheel-container {
            position: relative;
            width: 300px;
            height: 300px;
            margin: 20px;
        }

        .wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            position: relative;
            transition: transform 4s cubic-bezier(0.17, 0.67, 0.12, 0.99);
            transform: rotate(0deg);
            background: conic-gradient(
                #ff6b6b 0% 20%,
                #4ecdc4 20% 40%,
                #45b7d1 40% 60%,
                #96ceb4 60% 80%,
                #ff9999 80% 100%
            );
        }

        .pointer {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 20px;
            height: 40px;
            z-index: 2;
            color: #333;
            font-size: 30px;
        }

        .option {
            position: absolute;
            left: 50%;
            top: 50%;
            transform-origin: 0 0;
            width: 140px; /* Half of wheel width */
            text-align: left;
            padding-left: 20px;
            color: white;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
            font-size: 14px;
            line-height: 1.2;
        }

        .spin-button {
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 18px;
            cursor: pointer;
            background-color: #ffcc00;
            border: none;
            border-radius: 5px;
        }

        .result-modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.3);
            text-align: center;
        }

        .retry-button {
            margin-top: 10px;
            padding: 8px 16px;
            background-color: #ffcc00;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="wheel-container">
        <div class="pointer">▼</div>
        <div class="wheel" id="wheel">
            <div class="option" style="transform: rotate(36deg) translate(0, -50%)">69 buziaków od Czarka</div>
            <div class="option" style="transform: rotate(108deg) translate(0, -50%)">Odblokowanie piosenki na playliście</div>
            <div class="option" style="transform: rotate(180deg) translate(0, -50%)">Wysłanie wiadomości do swojego WSPANIAŁEGO chłopaka</div>
            <div class="option" style="transform: rotate(252deg) translate(0, -50%)">Jedno Ferrerko</div>
            <div class="option" style="transform: rotate(324deg) translate(0, -50%)">Białe Porsche 911 cabrio</div>
        </div>
    </div>
    <button class="spin-button" onclick="spinWheel()">Zakręć kołem!</button>

    <div class="result-modal" id="resultModal">
        <h3 id="prizeText"></h3>
        <button class="retry-button" onclick="closeModal()">Chcesz spróbować ponownie?</button>
    </div>

    <script>
        const prizes = [
            "69 buziaków od Czarka",
            "Odblokowanie piosenki na playliście",
            "Wysłanie wiadomości do swojego WSPANIAŁEGO chłopaka",
            "Jedno Ferrerko",
            "Białe Porsche 911 cabrio"
        ];

        let canSpin = true;

        function spinWheel() {
            if (!canSpin) return;
            canSpin = false;

            const wheel = document.getElementById('wheel');
            
            // Calculate initial natural spin
            const fullRotations = 4 * 360; // 4 full spins
            const prizeAngle = 72; // 360 / 5 prizes = 72 degrees per prize
            
            // Include Porsche in initial random selection
            const initialPrizeIndex = Math.floor(Math.random() * 5);
            const randomOffset = Math.random() * 20 - 10;
            const initialRotation = -(fullRotations + (initialPrizeIndex * prizeAngle) + randomOffset);
            
            // Start the natural spin
            wheel.style.transform = `rotate(${initialRotation}deg)`;

            setTimeout(() => {
                // If it naturally landed on Porsche (index 4), make the obvious cheat move
                if (initialPrizeIndex === 4) {
                    // Pick a new random prize (excluding Porsche)
                    const newPrizeIndex = Math.floor(Math.random() * 4);
                    const cheatRotation = -(fullRotations + (newPrizeIndex * prizeAngle));
                    
                    // Quick "cheat" movement
                    wheel.style.transition = 'transform 0.5s cubic-bezier(0.2, 0.8, 0.3, 1.0)';
                    wheel.style.transform = `rotate(${cheatRotation}deg)`;
                    
                    setTimeout(() => {
                        showResult(newPrizeIndex, true);
                        // Reset transition for next spin
                        wheel.style.transition = 'transform 4s cubic-bezier(0.17, 0.67, 0.12, 0.99)';
                    }, 500);
                } else {
                    showResult(initialPrizeIndex, false);
                }
            }, 4000);
        }

        function showResult(prizeIndex, didCheat) {
            const modal = document.getElementById('resultModal');
            const prizeText = document.getElementById('prizeText');
            
            // Only add the cheeky message if we had to cheat
            const extraMessage = didCheat ? ' (Porsche akurat w serwisie 😅)' : '!';
            prizeText.textContent = `Wygrywasz: ${prizes[prizeIndex]}${extraMessage}`;
            modal.style.display = 'block';

            if (prizeIndex === 2) { // Message option
                const messageText = "Mój chłopak jest najcudowniejszy pod słońcem, uwielbiam go i nie mogę się doczekać a znów się zobaczymy 🥰 (wcale nie wygrałam tej wiadomości w kole fortuny i nie musiałam jej wysłać)";
                const encodedMessage = encodeURIComponent(messageText);
                window.location.href = `sms:+48603815422&body=${encodedMessage}`;
            }
        }

        function closeModal() {
            document.getElementById('resultModal').style.display = 'none';
            canSpin = true;
        }
    </script>
</body>
</html>
