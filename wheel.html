<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Koło Fortuny</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #fdf6e3;
        }

        .wheel-container {
            position: relative;
            width: 300px;
            height: 300px;
            margin: 20px;
        }

        .wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            position: relative;
            transition: transform 4s cubic-bezier(0.17, 0.67, 0.12, 0.99);
            transform: rotate(0deg);
            background: conic-gradient(
                #ff6b6b 0% 20%,
                #4ecdc4 20% 40%,
                #45b7d1 40% 60%,
                #96ceb4 60% 80%,
                #ff9999 80% 100%
            );
        }

        .wheel::after {
            content: '▼';
            position: absolute;
            top: -30px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 30px;
            color: #333;
        }

        .option {
            position: absolute;
            width: 50%;
            text-align: center;
            transform-origin: 100% 50%;
            font-size: 12px;
            padding: 0 30px;
            box-sizing: border-box;
            color: white;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
        }

        .spin-button {
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 18px;
            cursor: pointer;
            background-color: #ffcc00;
            border: none;
            border-radius: 5px;
        }

        .result-modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.3);
            text-align: center;
        }

        .retry-button {
            margin-top: 10px;
            padding: 8px 16px;
            background-color: #ffcc00;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="wheel-container">
        <div class="wheel" id="wheel">
            <div class="option" style="transform: rotate(36deg)">69 buziaków od Czarka</div>
            <div class="option" style="transform: rotate(108deg)">Odblokowanie piosenki na playliście</div>
            <div class="option" style="transform: rotate(180deg)">Wysłanie wiadomości do swojego WSPANIAŁEGO chłopaka</div>
            <div class="option" style="transform: rotate(252deg)">Jedno Ferrerko</div>
            <div class="option" style="transform: rotate(324deg)">Białe Porsche 911 cabrio</div>
        </div>
    </div>
    <button class="spin-button" onclick="spinWheel()">Zakręć kołem!</button>

    <div class="result-modal" id="resultModal">
        <h3 id="prizeText"></h3>
        <button class="retry-button" onclick="closeModal()">Chcesz spróbować ponownie?</button>
    </div>

    <script>
        const prizes = [
            "69 buziaków od Czarka",
            "Odblokowanie piosenki na playliście",
            "Wysłanie wiadomości do swojego WSPANIAŁEGO chłopaka",
            "Jedno Ferrerko",
            "Białe Porsche 911 cabrio"
        ];

        let canSpin = true;

        function spinWheel() {
            if (!canSpin) return;
            canSpin = false;

            const wheel = document.getElementById('wheel');
            // Always make it look like it's about to land on Porsche
            const baseRotation = 1440 + (5 * 72) - 10; // 4 full rotations + position for Porsche
            
            // But then actually land on a different prize
            const selectedPrizeIndex = Math.floor(Math.random() * 4); // Excludes Porsche
            const additionalRotation = selectedPrizeIndex * 72 + Math.random() * 30;
            
            const totalRotation = baseRotation + additionalRotation;
            
            wheel.style.transform = `rotate(${totalRotation}deg)`;

            setTimeout(() => {
                showResult(selectedPrizeIndex);
            }, 4000);
        }

        function showResult(prizeIndex) {
            const modal = document.getElementById('resultModal');
            const prizeText = document.getElementById('prizeText');
            prizeText.textContent = `Wygrywasz: ${prizes[prizeIndex]}!`;
            modal.style.display = 'block';

            if (prizeIndex === 2) { // Message option
                const messageText = "Mój chłopak jest najcudowniejszy pod słońcem, uwielbiam go i nie mogę się doczekać a znów się zobaczymy 🥰 (wcale nie wygrałam tej wiadomości w kole fortuny i nie musiałam jej wysłać)";
                const encodedMessage = encodeURIComponent(messageText);
                window.location.href = `sms:+48603815422&body=${encodedMessage}`;
            }
        }

        function closeModal() {
            document.getElementById('resultModal').style.display = 'none';
            canSpin = true;
        }
    </script>
</body>
</html>
